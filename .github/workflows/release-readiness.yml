name: Release Readiness

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    env:
      VERSION: ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run test suite
        run: make test

      - name: Build release artifacts
        run: make release-artifacts VERSION=${VERSION}

      - name: Run Linux install smoke test
        run: ./scripts/install-smoke.sh ./dist/microhook_${VERSION}_linux_amd64.tar.gz

      - name: Run packaged-binary release e2e
        run: ./scripts/release-e2e.sh ./dist/microhook_${VERSION}_linux_amd64.tar.gz

      - name: Verify systemd unit
        run: ./scripts/verify-systemd.sh

      - name: Build Docker image
        run: docker build -t microhook:${VERSION} .
